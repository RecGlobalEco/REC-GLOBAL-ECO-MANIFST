<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RecGlobalEco System</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at center, #0b1f17, #030a07);
  color:#b6ffd2;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
  background:#06110d;
  border-bottom:1px solid #00ff9955;
  font-size:13px;
}

.status {
  color:#00ff99;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:10px;
  padding:10px;
}

@media(max-width:900px){
  .container {
    grid-template-columns:1fr;
  }
}

/* BOX STYLE */
.box {
  background:linear-gradient(145deg,#0a1f18,#06110d);
  border:1px solid #00ff9933;
  border-radius:12px;
  padding:10px;
  box-shadow:0 0 20px #00ff9922;
  position:relative;
}

/* TITLE */
.box h3 {
  font-size:13px;
  color:#00ffaa;
  margin-bottom:5px;
}

/* LIVE */
.live img {
  width:100%;
  border-radius:10px;
  opacity:0.85;
}

/* GRID OVERLAY */
.grid-overlay::after {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background-image: linear-gradient(#00ff2211 1px, transparent 1px),
                    linear-gradient(90deg,#00ff2211 1px, transparent 1px);
  background-size:30px 30px;
}

/* PRODUCTS */
.products {
  position:absolute;
  bottom:10px;
  left:10px;
  display:none;
  gap:10px;
}

.product {
  background:#001a11cc;
  border:1px solid #00ff99;
  padding:6px;
  font-size:11px;
  border-radius:6px;
}

/* BUTTONS */
button {
  width:100%;
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.bid { background:#ffaa33; }
.buy { background:#00ff99; }

/* PRICE */
.price {
  font-size:28px;
  color:#00ff99;
  text-shadow:0 0 10px #00ff99;
}

/* MAP */
.map {
  height:180px;
  position:relative;
  border-radius:10px;
  overflow:hidden;
  background:#02100a;
}

/* VEHICLES */
.vehicle {
  width:6px;
  height:6px;
  background:#00ffcc;
  border-radius:50%;
  position:absolute;
  box-shadow:0 0 10px #00ffcc;
  animation:move 10s linear infinite;
}

@keyframes move {
  0% { left:0; top:60%; }
  50% { left:70%; top:20%; }
  100% { left:100%; top:70%; }
}

/* TRANSPORT LINES */
.line {
  position:absolute;
  width:100%;
  height:2px;
  background:linear-gradient(90deg, transparent, #00ff99, transparent);
  animation:flow 4s infinite;
}

@keyframes flow {
  0% { transform:translateX(-100%); opacity:0; }
  50% { opacity:1; }
  100% { transform:translateX(100%); opacity:0; }
}

/* CLIENT */
.client p {
  font-size:12px;
}

/* CHAT */
.chat {
  position:fixed;
  bottom:10px;
  right:10px;
  width:220px;
  background:#06110d;
  border:1px solid #00ff9933;
  border-radius:10px;
  padding:8px;
}

/* MODAL MAP */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#000c;
  justify-content:center;
  align-items:center;
}

.modal iframe {
  width:95%;
  height:90%;
}
</style>

</head>

<body>

<header>
  <div>🌱 RECGLOBALECO SYSTEM</div>
  <div class="status">● ALL SYSTEMS ACTIVE</div>
</header>

<div class="container">

  <!-- GLOBAL MAP -->
  <div class="box map grid-overlay" onclick="openMap()">
    <h3>GLOBAL NETWORK</h3>
    <div class="vehicle"></div>
    <div class="vehicle" style="animation-delay:3s"></div>
  </div>

  <!-- LIVE STREAM -->
  <div class="box live grid-overlay">
    <h3>LIVE PROCESSING</h3>
    <img src="https://images.unsplash.com/photo-1581093458791-9d42c7b9a3c2">

    <div class="products" id="products">
      <div class="product">PLYWOOD 500$</div>
      <div class="product">PALLETS 300$</div>
    </div>

    <button onclick="toggleLive()">AKTYWUJ SPRZEDAŻ LIVE</button>
  </div>

  <!-- AUCTION -->
  <div class="box">
    <h3>LIVE AUCTION</h3>
    <div class="price" id="price">5800 USD</div>
    <p id="timer"></p>

    <button class="bid" onclick="bid()">PRZEBIJ</button>
    <button class="buy" onclick="buy()">KUP TERAZ</button>
  </div>

  <!-- MAPS -->
  <div class="box">
    <h3>LOGISTICS</h3>

    <div class="map">
      🚛 FLEET
      <div class="vehicle"></div>
    </div>

    <div class="map" style="margin-top:5px;">
      📦 TRANSPORT
      <div class="line"></div>
    </div>
  </div>

  <!-- CLIENT -->
  <div class="box client">
    <h3>CLIENT PANEL</h3>
    <p>Order: Plywood</p>
    <p>Status: IN TRANSIT</p>
    <p>Source: MACHINE</p>

    <button onclick="openMap()">TRACK</button>
  </div>

</div>

<!-- MAP MODAL -->
<div class="modal" id="mapModal" onclick="closeMap()">
  <iframe src="https://maps.google.com/maps?q=world&t=&z=3&output=embed"></iframe>
</div>

<!-- CHAT -->
<div class="chat">
  <b>CHAT</b>
  <input placeholder="message..." style="width:100%">
</div>

<script>
let price = 5800;
let time = 900;
let live = false;

function bid(){
  price += 100;
  document.getElementById("price").innerText = price + " USD";
}

function buy(){
  alert("TRANSACTION COMPLETE");
}

function toggleLive(){
  live = !live;
  document.getElementById("products").style.display =
    live ? "flex" : "none";
}

function openMap(){
  document.getElementById("mapModal").style.display="flex";
}

function closeMap(){
  document.getElementById("mapModal").style.display="none";
}

setInterval(()=>{
  if(time>0){
    time--;
    document.getElementById("timer").innerText =
      "ENDS IN: " + time + "s";
  }
},1000);
</script>

</body>
</html>
