<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecGlobalEco | Mission Control Luxury</title>
    <style>
        body { font-family: 'Georgia', serif; background: #050505; color: #d4d4d4; margin: 0; overflow-x: hidden; }
        
        /* TŁO I STYLIZACJA KOKPITU */
        .dashboard {
            background: radial-gradient(circle at center, #1a1c1c 0%, #000 100%);
            min-height: 100vh;
            padding: 40px 20px;
            border: 15px solid #111; /* Gruba rama jak w aucie */
        }

        /* GŁÓWNY ZEGAR */
        .main-clock {
            width: 250px;
            height: 250px;
            border: 5px solid #c0c0c0; /* Srebrna ramka zegara RR */
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            background: url('05_assets_and_media/1774222927487.png') no-repeat center;
            background-size: 50%;
            box-shadow: 0 0 40px rgba(46, 204, 113, 0.2);
        }
        .main-timer { font-size: 2.5rem; color: #2ecc71; margin-top: 20px; font-family: monospace; }

        /* MNIEJSZE ZEGARY PROCESOWE */
        .gauges {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
            margin-top: 50px;
        }
        .gauge-card { width: 160px; text-align: center; }
        .analog-gauge {
            width: 110px;
            height: 110px;
            border: 2px solid #444;
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            background: #0a0a0a;
        }
        .needle {
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: 2px;
            height: 40px;
            background: #2ecc71;
            transform-origin: bottom;
            transition: transform 1s;
        }

        /* AKTYWNE LOGO ROLLS-ROYCE */
        .rr-link-box {
            position: fixed;
            bottom: 30px;
            right: 30px;
            text-align: center;
            z-index: 1000;
        }
        .rr-link-box a {
            display: block;
            transition: 0.4s;
            filter: grayscale(1) brightness(2);
            opacity: 0.5;
        }
        .rr-link-box a:hover {
            filter: grayscale(0) brightness(1.2);
            opacity: 1;
            transform: translateY(-5px);
        }
        .rr-link-box img { width: 60px; }
        .rr-label { font-size: 0.6rem; color: #555; margin-top: 5px; letter-spacing: 2px; }

        /* PŁYTY DO PRZESUWANIA NA DOLE */
        #production {
            margin-top: 60px;
            height: 120px;
            border-top: 1px solid #222;
            position: relative;
        }
        .plate {
            position: absolute;
            width: 70px;
            height: 40px;
            background: #1e272e;
            border: 1px solid #2ecc71;
            color: #2ecc71;
            font-size: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div style="margin-bottom: 40px;">
        <p style="letter-spacing: 12px; font-size: 0.7rem; color: #888;">REC GLOBAL ECO | PRECISION RWA</p>
        <div class="main-clock"></div>
        <div class="main-timer" id="main-timer">00d 00:00:00</div>
    </div>

    <div class="gauges">
        <div class="gauge-card">
            <div class="analog-gauge"><div class="needle" id="n1"></div></div>
            <p style="font-size: 0.6rem; margin-top: 10px;">APP SYNC</p>
            <div id="t1" style="font-size: 0.8rem;">00:00:00</div>
        </div>
        <div class="gauge-card">
            <div class="analog-gauge"><div class="needle" id="n2"></div></div>
            <p style="font-size: 0.6rem; margin-top: 10px;">HUB LOAD</p>
            <div id="t2" style="font-size: 0.8rem;">00:00:00</div>
        </div>
        <div class="gauge-card">
            <div class="analog-gauge"><div class="needle" id="n3"></div></div>
            <p style="font-size: 0.6rem; margin-top: 10px;">LOGISTICS</p>
            <div id="t3" style="font-size: 0.8rem;">00:00:00</div>
        </div>
    </div>

    <div id="production">
        <p style="font-size: 0.6rem; color: #333; padding: 10px;">MANUAL RWA PROCESSING UNIT</p>
    </div>
</div>

<div class="rr-link-box">
    <a href="https://www.rolls-roycemotorcars.com" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/1/18/Rolls-Royce_Motor_Cars_logo.svg/1200px-Rolls-Royce_Motor_Cars_logo.svg.png" alt="Rolls-Royce">
    </a>
    <div class="rr-label">INSPIRED BY BOAT TAIL</div>
</div>

<script>
    function update() {
        const now = new Date().getTime();
        const launch = new Date("April 20, 2026 12:00:00").getTime();
        
        const diff = launch - now;
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("main-timer").innerText = `${d}d ${h}h ${m}m ${s}s`;
        
        // Ruch wskazówek
        document.getElementById("n1").style.transform = `translateX(-50%) rotate(${s * 6}deg)`;
        document.getElementById("n2").style.transform = `translateX(-50%) rotate(${m * 6}deg)`;
        document.getElementById("n3").style.transform = `translateX(-50%) rotate(${h * 15}deg)`;
    }
    setInterval(update, 1000);

    // Mechanizm przesuwania płyt
    const prod = document.getElementById('production');
    for(let i=0; i<5; i++) {
        const p = document.createElement('div');
        p.className = 'plate';
        p.innerText = 'RWA-BOARD';
        p.style.left = (50 + i*90) + 'px';
        p.style.top = '40px';
        
        p.onmousedown = p.ontouchstart = function(e) {
            let move = (ev) => {
                let x = ev.touches ? ev.touches[0].clientX : ev.clientX;
                p.style.left = (x - 35) + 'px';
            };
            window.onmousemove = window.ontouchmove = move;
            window.onmouseup = window.ontouchend = () => { window.onmousemove = window.ontouchmove = null; };
        };
        prod.appendChild(p);
    }
</script>

</body>
</html>
