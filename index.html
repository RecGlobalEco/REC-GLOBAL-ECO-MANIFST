<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RecGlobalEco</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#081712;
  color:#d8ffe0;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#0f241c;
  font-size:14px;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns: 1.5fr 1fr;
  gap:10px;
  padding:10px;
}

/* MOBILE */
@media(max-width:900px){
  .container {
    grid-template-columns:1fr;
  }
}

/* BOX */
.box {
  background:#10281f;
  border-radius:12px;
  padding:10px;
  position:relative;
}

/* LIVE */
.live img {
  width:100%;
  border-radius:10px;
}

.products {
  position:absolute;
  bottom:10px;
  left:10px;
  display:none;
  gap:8px;
  flex-wrap:wrap;
}

.product {
  background:#000a;
  padding:6px;
  border-radius:6px;
  font-size:12px;
}

/* AUCTION */
.price {
  font-size:26px;
  color:#00ff99;
}

/* BUTTONS */
button {
  width:100%;
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:6px;
}

.bid { background:#ff9933; }
.buy { background:#00cc66; }

/* MAPY */
.maps {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

@media(max-width:600px){
  .maps {
    grid-template-columns:1fr;
  }
}

.map {
  height:180px;
  background:#0f241c;
  border-radius:10px;
  position:relative;
  overflow:hidden;
}

/* ANIMACJA AUT */
.vehicle {
  width:8px;
  height:8px;
  background:#00ffcc;
  border-radius:50%;
  position:absolute;
  animation:move 8s linear infinite;
}

@keyframes move {
  0% { left:0; top:50%; }
  50% { left:70%; top:20%; }
  100% { left:100%; top:70%; }
}

/* TRANSPORT */
.line {
  position:absolute;
  width:100%;
  height:2px;
  background:linear-gradient(90deg, transparent, #00ff99, transparent);
  animation:flow 3s infinite;
}

@keyframes flow {
  0% { opacity:0; transform:translateX(-100%); }
  50% { opacity:1; }
  100% { transform:translateX(100%); opacity:0; }
}

/* CLIENT */
.client {
  font-size:14px;
}

/* CHAT */
.chat {
  position:fixed;
  bottom:10px;
  right:10px;
  width:220px;
  background:#0f241c;
  border-radius:10px;
  padding:8px;
}

.chat input {
  width:100%;
}

/* MAP MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#000c;
  justify-content:center;
  align-items:center;
}

.modal iframe {
  width:95%;
  height:90%;
  border:0;
}
</style>
</head>

<body>

<header>
  <div>🌱 RecGlobalEco</div>
  <div>🟢 GLOBAL ACTIVE</div>
</header>

<div class="container">

  <!-- MAPA GLOBAL -->
  <div class="box">
    <h4>🌍 GLOBAL IMPACT</h4>
    <div class="map" onclick="openMap()">
      <div class="vehicle"></div>
      <div class="vehicle" style="animation-delay:2s;"></div>
      <div class="vehicle" style="animation-delay:4s;"></div>
    </div>
  </div>

  <!-- LIVE -->
  <div class="box live">
    <h4>🔴 LIVE STREAM</h4>
    <img src="https://images.unsplash.com/photo-1581093458791-9d42c7b9a3c2">

    <div class="products" id="products">
      <div class="product">Sklejka 500$</div>
      <div class="product">Palety 300$</div>
    </div>

    <button onclick="toggleLive()">Włącz sprzedaż LIVE</button>
  </div>

  <!-- AUKCJA -->
  <div class="box">
    <h4>💰 AUKCJA</h4>
    <div class="price" id="price">5800 USD</div>
    <p id="timer"></p>

    <button class="bid" onclick="bid()">Przebij</button>
    <button class="buy" onclick="buy()">Kup teraz</button>
  </div>

  <!-- MAPY 2 -->
  <div class="box maps">
    <div class="map">
      🚛 FLOTA
      <div class="vehicle"></div>
    </div>

    <div class="map">
      📦 TRANSPORT
      <div class="line"></div>
    </div>
  </div>

  <!-- KLIENT -->
  <div class="box client">
    <h4>📦 MOJE ZAMÓWIENIA</h4>
    <p>Sklejka 9mm</p>
    <p>🚚 W drodze</p>
    <button onclick="openMap()">Śledź</button>
  </div>

</div>

<!-- MAPA -->
<div class="modal" id="mapModal" onclick="closeMap()">
  <iframe src="https://maps.google.com/maps?q=world&t=&z=3&output=embed"></iframe>
</div>

<!-- CHAT -->
<div class="chat">
  <b>Czat</b>
  <input placeholder="Napisz...">
</div>

<script>
let price = 5800;
let time = 900;
let live = false;

function bid(){
  price += 100;
  document.getElementById("price").innerText = price + " USD";
}

function buy(){
  alert("Kupiono!");
}

function toggleLive(){
  live = !live;
  document.getElementById("products").style.display =
    live ? "flex" : "none";
}

function openMap(){
  document.getElementById("mapModal").style.display="flex";
}

function closeMap(){
  document.getElementById("mapModal").style.display="none";
}

setInterval(()=>{
  if(time>0){
    time--;
    document.getElementById("timer").innerText =
      "Koniec za: " + time + "s";
  }
},1000);
</script>

</body>
</html>
