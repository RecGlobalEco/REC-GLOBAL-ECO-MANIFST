<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GAL LIVE | MARKET ARBITRAGE</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* LEWA STRONA - VIDEO STREAM (TIKTOK VIBE) */
        .video-container { flex: 2; position: relative; background: #050505; border-right: 2px solid #333; }
        .video-feed { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .live-tag { position: absolute; top: 20px; left: 20px; background: red; color: white; padding: 5px 15px; border-radius: 5px; animation: blink 1s infinite; }
        
        /* PRAWA STRONA - LICYTACJA I BOT ARBITRAŻOWY */
        .auction-sidebar { flex: 1; padding: 20px; display: flex; flex-direction: column; background: #0a0a0a; }
        .price-box { font-size: 48px; text-align: center; margin: 20px 0; border: 1px solid #00ff41; padding: 10px; }
        .bid-history { flex-grow: 1; overflow-y: hidden; font-size: 14px; color: #888; }
        .bot-action { color: #f59e0b; font-weight: bold; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        
        /* PRZYCISKI */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 15px; border: 1px solid #00ff41; background: transparent; color: #00ff41; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #00ff41; color: #000; }
    </style>
</head>
<body>

<div class="video-container">
    <div class="live-tag">● LIVE FEED: UNIT_GAL_01</div>
    <div style="display:flex; align-items:center; justify-content:center; height:100%; font-size:20px; color:#333;">
        [ STREAM WIDEO Z PRACY MASZYNY / TOWARU ]
    </div>
</div>

<div class="auction-sidebar">
    <h2 style="margin:0;">GAL ARBITRAGE BOT v1</h2>
    <p style="font-size: 12px; color: #555;">Skanowanie rynku: Scania, Strabag, OLX...</p>
    
    <div class="price-box" id="current-price">124.50 PLN</div>
    
    <div class="bid-history" id="history">
        <div>> System: Skanowanie konkurencji...</div>
        <div>> Rynek: Cena średnia 130.00 PLN</div>
        <div class="bot-action">> BOT: Licytacja +0.20 PLN</div>
        <div class="bot-action">> BOT: Licytacja +0.20 PLN</div>
    </div>

    <div class="controls">
        <button class="btn">KUP TERAZ</button>
        <button class="btn">CZAT Z OBSŁUGĄ</button>
    </div>
</div>

<script>
    // PROSTY ALGORYTM PODBIJANIA CENY (SZYBKI TEST)
    let price = 124.50;
    const history = document.getElementById('history');
    const priceDisplay = document.getElementById('current-price');

    setInterval(() => {
        price += 0.20;
        priceDisplay.innerText = price.toFixed(2) + " PLN";
        let entry = document.createElement('div');
        entry.className = "bot-action";
        entry.innerText = `> BOT: Licytacja +0.20 PLN (Automatyczne przebicie)`;
        history.prepend(entry);
    }, 3000); // Co 3 sekundy podbija o 20 groszy
</script>

</body>
</html>
