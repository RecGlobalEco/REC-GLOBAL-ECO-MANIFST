<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REC-GLOBAL | RADAME HUB</title>
    <style>
        :root { --green: #00ff41; --dark: #050505; --panel-bg: rgba(0, 255, 65, 0.05); }
        * { box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: var(--dark); color: var(--green); margin: 0; overflow-x: hidden; }

        /* NAGŁÓWEK */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; border-bottom: 2px solid var(--green);
            background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 100;
        }

        /* DASHBOARD - UKŁAD POZIOMY (TABLET/PC) */
        #dashboard {
            display: grid; padding: 10px; gap: 10px;
            grid-template-columns: 280px 1fr 320px; 
            height: calc(100vh - 100px);
        }

        .panel { 
            border: 1px solid var(--green); background: var(--panel-bg); 
            padding: 12px; position: relative; overflow-y: auto;
        }

        /* TRYB PIONOWY (TELEFON) */
        @media (max-width: 800px) {
            #dashboard {
                display: flex; flex-direction: column; height: auto;
            }
            header { flex-direction: column; height: auto; gap: 10px; text-align: center; }
            .side-panel { order: 3; height: 250px; } /* Logi na dół */
            .main-content { order: 1; min-height: 400px; } /* Aukcja na górę */
            .auction-list { order: 2; } /* Produkty w środku */
        }

        /* PRZYCISKI I RAMKI */
        .btn { background: var(--green); color: #000; border: none; padding: 8px 12px; font-weight: bold; cursor: pointer; }
        .log { font-size: 11px; margin-bottom: 5px; border-left: 2px solid var(--green); padding-left: 8px; }
        
        /* SYMULACJA FILMU / MAPY */
        .video-placeholder {
            width: 100%; height: 200px; border: 1px dashed #333; 
            display: flex; align-items: center; justify-content: center; margin: 10px 0;
        }
    </style>
</head>
<body>

<header>
    <div>UNIT: RADAME-HQ | <span id="clock">00:00:00</span></div>
    <div>BALANCE: <span id="balance" style="color:#fff;">100.00</span> $REC</div>
    <button class="btn" onclick="alert('SYNCING...')">CONNECT WALLET</button>
</header>

<div id="dashboard">
    <div class="panel side-panel">
        <strong>SOLANA DePIN NODES</strong>
        <div style="font-size: 11px; margin-top:10px;">
            <div style="color:#fff;">> NODE_X1: ACTIVE (1.2 $REC)</div>
            <div style="color:#fff; margin-top:5px;">> NODE_X2: STANDBY (DUBAI)</div>
        </div>
        <hr style="border:0; border-top:1px solid #222; margin: 15px 0;">
        <strong>MACHINE TELEMETRY</strong>
        <div id="logs" style="margin-top:5px;"></div>
    </div>

    <div class="panel main-content">
        <strong>LIVE AUCTION: LOT #14 (PLYWOOD)</strong>
        <div class="video-placeholder">
            <div style="text-align: center;">
                <span style="font-size: 40px;">🏗️</span><br>
                [ OBRAZ MASZYNY / PROTOTYPU ]
            </div>
        </div>
        <div style="display:flex; justify-content: space-between; align-items: center; margin-top:10px;">
            <div>BID: <span id="price" style="font-size: 20px; color:#fff;">5,800</span> USD</div>
            <button class="btn" style="height:40px;">BID NOW</button>
        </div>
    </div>

    <div class="panel auction-list">
        <strong>BUY NOW: EKO-RESOURCES</strong>
        <div id="products" style="margin-top:10px;">
            </div>
    </div>
</div>

<script>
    // Zegar
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    // Cena aukcji idzie w górę
    setInterval(() => {
        const p = document.getElementById('price');
        p.innerText = (parseInt(p.innerText.replace(',','')) + 15).toLocaleString();
    }, 4000);

    // Dynamiczne logi maszyn
    const msgs = ["> CORE TEMP OK", "> SYNCED BLOCK", "> LOAD: 72%", "> PRESSURE NOMINAL"];
    setInterval(() => {
        const l = document.getElementById('logs');
        const d = document.createElement('div');
        d.className = 'log';
        d.innerText = msgs[Math.floor(Math.random()*msgs.length)];
        l.prepend(d);
        if(l.children.length > 8) l.lastChild.remove();
    }, 2500);

    // Lista produktów kup teraz
    const items = ["Profil Eko-S1", "Płyta Recykling", "Mata Izolacyjna"];
    function addProd() {
        const div = document.getElementById('products');
        const i = items[Math.floor(Math.random()*items.length)];
        const entry = document.createElement('div');
        entry.style.cssText = "border:1px solid #222; padding:8px; margin-bottom:10px; background:rgba(0,0,0,0.3);";
        entry.innerHTML = `<small>ID: ${Math.random().toString(16).substring(8)}</small><br><strong>${i}</strong><br>PRICE: 0.45 SOL <button class="btn" style="font-size:9px; float:right;">BUY</button>`;
        div.prepend(entry);
        if(div.children.length > 4) div.lastChild.remove();
    }
    setInterval(addProd, 5000);
</script>

</body>
</html>
