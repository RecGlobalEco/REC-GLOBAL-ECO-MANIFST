<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecGlobalEco | Nowa Energia</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            color: #166534;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            max-width: 500px;
            border: 1px solid rgba(21, 128, 61, 0.1);
        }
        .logo-box img {
            max-width: 180px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }
        h1 { font-size: 2.2rem; margin: 10px 0; color: #15803d; letter-spacing: -1px; }
        p { font-size: 1.1rem; color: #4b5563; line-height: 1.6; }
        .footer-note {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px dashed #dcfce7;
            font-size: 0.8rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="RecGlobalEco Logo">
        </div>
        <h1>RecGlobalEco</h1>
        <p>Przekształcamy starą energię w nowe, ekologiczne rozwiązania. Projekt w trakcie wdrażania.</p>
        
        <div class="footer-note">
            RecGlobalEco to niezależny podmiot. <br>
            Domena recglobal.pl została nabyta po jej wygaśnięciu.
        </div>
    </div>
</body>
</html>
