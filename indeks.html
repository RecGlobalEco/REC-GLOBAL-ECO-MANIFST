<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REC Global Eco</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1f17;
    color: white;
}

section {
    padding: 60px 20px;
    text-align: center;
}

.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

h1 {font-size: 40px;}
h2 {font-size: 28px;}

.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 25px;
    background: #2ecc71;
    color: black;
    text-decoration: none;
    border-radius: 5px;
}

.grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    width: 250px;
    margin: 10px;
    padding: 20px;
    background: #132e23;
    border-radius: 10px;
}

input, textarea {
    width: 80%;
    max-width: 400px;
    padding: 10px;
    margin: 5px;
}
</style>

</head>
<body>

<!-- HERO -->
<section class="hero">
    <h1>REC Global Eco</h1>
    <p>Przekształcamy odpady w wartość</p>
    <a href="#kontakt" class="btn">Kontakt</a>
</section>

<!-- O NAS -->
<section>
    <h2>O nas</h2>
    <p>Mobilny system recyklingu i produkcji materiałów na miejscu.</p>
</section>

<!-- JAK DZIAŁA -->
<section>
    <h2>Jak to działa</h2>
    <div class="grid">
        <div class="card">Zbieranie</div>
        <div class="card">Przetwarzanie</div>
        <div class="card">Produkcja</div>
    </div>
</section>

<!-- OBRAZEK TEST -->
<section>
    <h2>System</h2>
<img src="truck.jpg">
</section>

<!-- KONTAKT -->
<section id="kontakt">
    <h2>Kontakt</h2>
    <input type="text" placeholder="Imię"><br>
    <input type="email" placeholder="Email"><br>
    <textarea placeholder="Wiadomość"></textarea><br>
    <button class="btn">Wyślij</button>
</section>

</body>
</html>
